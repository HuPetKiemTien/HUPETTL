        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

            padding: 0 15px; height: var(--nav-height);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .profit-actions { display: flex; gap: 10px; }

</head>
<body>

    <div id="app-shell">
        
        <!-- NỬA TRÊN: Iframe (Max size) -->
        <div class="top-web">
            <iframe src="https://www.bl555dd.cc/m/home?r=mvk9536" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation"></iframe>
        </div>

        <!-- NỬA DƯỚI: Công cụ AI -->
        <div class="bottom-tool">
            
            <div class="stats-row">
                <div>
                    <span style="color: var(--color-p)">P: <span id="st-p">0</span></span> &nbsp;|&nbsp;
                    <span style="color: var(--color-t)">T: <span id="st-t">0</span></span> &nbsp;|&nbsp;
                    <span style="color: var(--color-b)">B: <span id="st-b">0</span></span>
                </div>
                <div class="sys-btn" onclick="rebootSystem()"><i class="fas fa-trash-alt"></i> Làm mới toàn bộ</div>
            </div>

            <div class="action-btns">
                <button class="btn-act b-p" onclick="recordHand('P')">Player</button>
                <button class="btn-act b-t" onclick="recordHand('T')">Tie</button>
                <button class="btn-act b-b" onclick="recordHand('B')">Banker</button>
            </div>

            <div class="dashboard-grid">
                <!-- Thẻ AI -->
                <div class="ai-card">
                    <div class="card-title">
                        <span id="ai-mode"><i class="fas fa-robot"></i> AI Sẵn sàng</span>
                        <span id="ai-conf">0%</span>
                    </div>
                    <div class="ai-pred pred-wait" id="ai-pred">CHỜ DỮ LIỆU</div>
                    <div class="ai-bar-bg"><div class="ai-bar-fill" id="ai-bar"></div></div>
                    <div class="ai-reason" id="ai-reason">Nhập kết quả các ván để hệ thống AI tính toán cầu.</div>
                </div>

                <!-- Thẻ Bảng Cầu -->
                <div class="road-card" id="scroll-box">
                    <div class="road-matrix" id="road-grid"></div>
                </div>
            </div>
        </div>

        <!-- MENU ĐÁY: THEO DÕI LỢI NHUẬN -->
        <div class="bottom-profit">
            <div class="profit-info">
                <i class="fas fa-wallet" style="color: var(--text-muted)"></i> Lợi nhuận: 
                <div class="profit-val" id="profit-display">0</div>
            </div>
            <div class="profit-actions">
                <button class="btn-pr btn-lose" onclick="updateProfit(-1)"><i class="fas fa-minus"></i></button>
                <button class="btn-pr btn-win" onclick="updateProfit(1)"><i class="fas fa-plus"></i></button>
            </div>
        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script>
        const apiKey = ""; 

        // 1. LẤY DỮ LIỆU TỪ LOCAL STORAGE KHI TẢI TRANG
        let historySequence = JSON.parse(localStorage.getItem('bac_history')) || [];
        let currentProfit = parseInt(localStorage.getItem('bac_profit')) || 0;

        // Khởi chạy khi load
        window.onload = () => {
            updateStatsUI();
            renderRoadmap();
            updateProfitUI();
            if(historySequence.length >= 3) engageAI();
        };

        // --- HỆ THỐNG LƯU TRỮ VÀ GIAO DIỆN ---
        function updateStatsUI() {
            let p=0, b=0, t=0;
            historySequence.forEach(h => { if(h==='P') p++; else if(h==='B') b++; else t++; });
            document.getElementById('st-p').textContent = p;
            document.getElementById('st-b').textContent = b;
            document.getElementById('st-t').textContent = t;
        }

        function renderRoadmap() {
            const grid = document.getElementById('road-grid');
            grid.innerHTML = '';

            const totalItems = historySequence.length;
            const requiredCols = Math.max(12, Math.ceil(totalItems / 6)); 
            const totalCells = requiredCols * 6;

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'matrix-cell';
                if (i < totalItems) {
                    const res = historySequence[i];
                    const bead = document.createElement('div');
                    bead.className = `bead ${res}`;
                    bead.textContent = res;
                    cell.appendChild(bead);
                }
                grid.appendChild(cell);
            }

            requestAnimationFrame(() => {
                const scrollBox = document.getElementById('scroll-box');
                scrollBox.scrollLeft = scrollBox.scrollWidth - scrollBox.clientWidth;
            });
        }

        // --- GHI NHẬN TAY CƯỢC ---
        function recordHand(winner) {
            historySequence.push(winner);
            // Lưu vào Local Storage
            localStorage.setItem('bac_history', JSON.stringify(historySequence));
            
            updateStatsUI();
            renderRoadmap();
            engageAI();
        }

        // --- TÍNH NĂNG LỢI NHUẬN ---
        function updateProfit(amount) {
            currentProfit += amount;
            localStorage.setItem('bac_profit', currentProfit);
            updateProfitUI();
        }

        function updateProfitUI() {
            const el = document.getElementById('profit-display');
            if (currentProfit > 0) {
                el.textContent = "+" + currentProfit;
                el.className = "profit-val win";
            } else if (currentProfit < 0) {
                el.textContent = currentProfit;
                el.className = "profit-val lose";
            } else {
                el.textContent = "0";
                el.className = "profit-val";
            }
        }

        // --- NÚT LÀM MỚI (XÓA SẠCH DỮ LIỆU) ---
        function rebootSystem() {
            if(confirm("Bạn có chắc muốn làm mới? Toàn bộ lịch sử cầu và lợi nhuận sẽ bị xóa sạch.")) {
                // Xóa mảng & Biến
                historySequence = [];
                currentProfit = 0;
                // Xóa Local Storage
                localStorage.removeItem('bac_history');
                localStorage.removeItem('bac_profit');
                
                // Reset Giao diện
                updateStatsUI();
                renderRoadmap();
                updateProfitUI();
                
                document.getElementById('ai-pred').textContent = "CHỜ DỮ LIỆU"; 
                document.getElementById('ai-pred').className = 'ai-pred pred-wait';
                document.getElementById('ai-bar').style.width = '0%';
                document.getElementById('ai-conf').textContent = '0%';
                document.getElementById('ai-reason').textContent = "Hệ thống đã được làm sạch.";
                document.getElementById('ai-mode').innerHTML = "<i class='fas fa-robot'></i> Sẵn sàng";
            }
        }

        // --- HỆ THỐNG AI ---
        async function engageAI() {
            const noTie = historySequence.filter(x => x !== 'T');
            if (noTie.length < 3) return;

            document.getElementById('ai-mode').innerHTML = "<i class='fas fa-spinner fa-spin'></i> Phân tích...";
            document.getElementById('ai-pred').textContent = "ANALYZING";
            document.getElementById('ai-pred').className = 'ai-pred pred-wait';
            document.getElementById('ai-bar').style.width = '0%';
            document.getElementById('ai-reason').textContent = "Áp dụng mô hình toán học...";

            try {
                const aiData = await fetchGeminiAPI(noTie);
                updateAIScreen(aiData, "Gemini AI");
            } catch (err) {
                const localData = calculateMarkovChain(noTie);
                updateAIScreen(localData, "Local AI");
            }
        }

        async function fetchGeminiAPI(dataArray) {
            if (!apiKey) throw new Error("No API");
            const seq = dataArray.slice(-15).join('');
            const prompt = `Phân tích Baccarat: ${seq}. Trả về JSON: {"prediction": "P" hoặc "B", "confidence": số (55-95), "reasoning": "1 lý do siêu ngắn tiếng việt"}`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" }})
            });
            if (!response.ok) throw new Error("Net Err");
            return JSON.parse((await response.json()).candidates[0].content.parts[0].text);
        }

        function calculateMarkovChain(data) {
            let transitions = { 'P': { 'P': 0, 'B': 0 }, 'B': { 'P': 0, 'B': 0 } };
            for (let i = 0; i < data.length - 1; i++) {
                transitions[data[i]][data[i+1]]++;
            }

            const lastState = data[data.length - 1];
            const nextFromLast = transitions[lastState];
            const totalTransitions = nextFromLast['P'] + nextFromLast['B'];
            
            let prediction = 'B'; let confidence = 50; let reasoning = "Chưa đủ dữ liệu lặp.";

            if (totalTransitions > 0) {
                const probP = nextFromLast['P'] / totalTransitions;
                if (probP > 0.5) { prediction = 'P'; confidence = Math.round(probP * 100); } 
                else if (probP < 0.5) { prediction = 'B'; confidence = Math.round((1 - probP) * 100); } 
                else { prediction = Math.random() > 0.5 ? 'P' : 'B'; confidence = 51; }
                reasoning = `Mô hình Markov: Tỷ lệ chuyển đổi từ ${lastState} sang ${prediction} đang cao nhất.`;
            } else {
                const pCount = data.filter(x => x === 'P').length;
                prediction = pCount > (data.length - pCount) ? 'B' : 'P'; 
                confidence = 55; reasoning = "Cân bằng xác suất: Bắt ngược cửa đang chiếm ưu thế ảo.";
            }

            if(confidence > 95) confidence = 95;
            if(confidence < 51) confidence = Math.floor(Math.random() * 10) + 51; 
            return { prediction, confidence, reasoning };
        }

        function updateAIScreen(data, modeName) {
            document.getElementById('ai-mode').innerHTML = `<i class='fas fa-check' style='color:var(--color-p)'></i> ${modeName}`;
            const predEl = document.getElementById('ai-pred');
            const barEl = document.getElementById('ai-bar');

            if (data.prediction === 'P') {
                predEl.textContent = "CON (PLAYER)"; predEl.className = 'ai-pred pred-p';
                barEl.style.background = 'var(--color-p)';
            } else {
                predEl.textContent = "CÁI (BANKER)"; predEl.className = 'ai-pred pred-b';
                barEl.style.background = 'var(--color-b)';
            }

            document.getElementById('ai-conf').textContent = `${data.confidence}%`;
            barEl.style.width = `${data.confidence}%`;
            document.getElementById('ai-reason').textContent = data.reasoning;
        }
    </script>
</body>
</html>
