<div class="app-container">

        ></iframe>
    </div>

    <div class="bottom-dashboard">
        <div class="cyber-header">
            <div class="ai-title"><div class="ai-status-dot"></div> QUANTUM CORE</div>

                <span class="p" id="st-p">P: 0</span>
                <span class="t" id="st-t">T: 0</span>
                <span class="b" id="st-b">B: 0</span>
            </div>
        </div>

        <div class="core-layout">
            <div class="left-panel">
                <div class="input-group">
                    <button class="cyber-btn btn-p" onclick="recordHand('P')">PLAYER</button>
                    <button class="cyber-btn btn-t" onclick="recordHand('T')">TIE</button>
                    <button class="cyber-btn btn-b" onclick="recordHand('B')">BANKER</button>
                </div>

                <div class="ai-screen">
                    <div class="screen-top">
                        <span id="ai-mode">GATHERING...</span>
                        <span id="ai-conf">0%</span>
                    </div>
                    <div class="prediction pred-wait" id="ai-pred">AWAITING</div>
                    <div class="conf-track"><div class="conf-fill" id="ai-bar"></div></div>
                    <div class="reason" id="ai-reason">Nhập kết quả để AI xây dựng ma trận...</div>
                </div>
                <div class="sys-btn" onclick="rebootSystem()">[ REBOOT SYSTEM ]</div>
            </div>

            <!-- Scroll box đã fix cuộn mượt mà -->
            <div class="right-panel" id="scroll-box">
                <div class="road-matrix" id="road-grid"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let historySequence = [];
    const apiKey = ""; 

    function renderRoadmap() {
        const grid = document.getElementById('road-grid');
        grid.innerHTML = '';

        const totalItems = historySequence.length;
        const requiredCols = Math.max(15, Math.ceil(totalItems / 6));
        const totalCells = requiredCols * 6;

        for (let i = 0; i < totalCells; i++) {
            const cell = document.createElement('div');
            cell.className = 'matrix-cell';
            
            if (i < totalItems) {
                const res = historySequence[i];
                const bead = document.createElement('div');
                bead.className = `bead ${res}`;
                bead.textContent = res;
                cell.appendChild(bead);
            }
            grid.appendChild(cell);
        }

        // Tự động nhảy thanh cuộn về cuối cùng khi có kết quả mới
        requestAnimationFrame(() => {
            const scrollBox = document.getElementById('scroll-box');
            scrollBox.scrollLeft = scrollBox.scrollWidth - scrollBox.clientWidth;
        });
    }

    function recordHand(winner) {
        historySequence.push(winner);
        
        let p=0, b=0, t=0;
        historySequence.forEach(h => { if(h==='P') p++; else if(h==='B') b++; else t++; });
        document.getElementById('st-p').textContent = `P: ${p}`;
        document.getElementById('st-b').textContent = `B: ${b}`;
        document.getElementById('st-t').textContent = `T: ${t}`;

        renderRoadmap();
        engageAI();
    }

    function rebootSystem() {
        if(confirm("Xóa bộ nhớ ma trận AI?")) {
            historySequence = [];
            document.getElementById('st-p').textContent = 'P: 0';
            document.getElementById('st-b').textContent = 'B: 0';
            document.getElementById('st-t').textContent = 'T: 0';
            renderRoadmap();
            
            document.getElementById('ai-pred').textContent = "AWAITING"; 
            document.getElementById('ai-pred').className = 'prediction pred-wait';
            document.getElementById('ai-bar').style.width = '0%';
            document.getElementById('ai-conf').textContent = '0%';
            document.getElementById('ai-reason').textContent = "Hệ thống đã được làm sạch.";
            document.getElementById('ai-mode').textContent = "STANDBY";
        }
    }

    async function engageAI() {
        const noTie = historySequence.filter(x => x !== 'T');
        if (noTie.length < 3) return;

        document.getElementById('ai-mode').textContent = "UPLOADING...";
        document.getElementById('ai-mode').style.color = "var(--neon-blue)";
        document.getElementById('ai-pred').textContent = "ANALYZING";
        document.getElementById('ai-pred').className = 'prediction pred-wait';
        document.getElementById('ai-bar').style.width = '0%';
        document.getElementById('ai-reason').textContent = "...";

        try {
            const aiData = await fetchGeminiAPI(noTie);
            updateAIScreen(aiData, "GEMINI CORE");
        } catch (err) {
            const localData = calculateMarkovChain(noTie);
            updateAIScreen(localData, "LOCAL QUANTUM");
        }
    }

    async function fetchGeminiAPI(dataArray) {
        if (!apiKey) throw new Error("No API");
        const seq = dataArray.slice(-15).join('');
        const prompt = `Phân tích chuỗi Baccarat: ${seq}. Tính xác suất theo Pattern. Trả về JSON: {"prediction": "P" hoặc "B", "confidence": số (55-95), "reasoning": "1 lý do ngắn gọn tiếng Việt"}`;

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" }})
        });
        
        if (!response.ok) throw new Error("Net Err");
        return JSON.parse((await response.json()).candidates[0].content.parts[0].text);
    }

    function calculateMarkovChain(data) {
        let transitions = { 'P': { 'P': 0, 'B': 0 }, 'B': { 'P': 0, 'B': 0 } };
        
        for (let i = 0; i < data.length - 1; i++) {
            transitions[data[i]][data[i+1]]++;
        }

        const lastState = data[data.length - 1];
        const nextFromLast = transitions[lastState];
        
        const totalTransitions = nextFromLast['P'] + nextFromLast['B'];
        let prediction = 'B'; 
        let confidence = 50;
        let reasoning = "Ma trận Markov: Dữ liệu chưa đủ chu kỳ.";

        if (totalTransitions > 0) {
            const probP = nextFromLast['P'] / totalTransitions;
            if (probP > 0.5) {
                prediction = 'P'; confidence = Math.round(probP * 100);
            } else if (probP < 0.5) {
                prediction = 'B'; confidence = Math.round((1 - probP) * 100);
            } else {
                prediction = Math.random() > 0.5 ? 'P' : 'B'; confidence = 51;
            }
            reasoning = `Phân tích ${totalTransitions} vòng lặp có chung mô hình, xác suất chuyển tiếp từ ${lastState} sang ${prediction} là cao nhất.`;
        } else {
            const pCount = data.filter(x => x === 'P').length;
            const bCount = data.length - pCount;
            prediction = pCount > bCount ? 'B' : 'P'; 
            confidence = 55;
            reasoning = "Hệ thống cân bằng độ lệch chuẩn tự động: Bắt ngược cửa đang chiếm ưu thế ảo.";
        }

        if(confidence > 95) confidence = 95;
        if(confidence < 51) confidence = Math.floor(Math.random() * 10) + 51; 
        
        return { prediction, confidence, reasoning };
    }

    function updateAIScreen(data, modeName) {
        document.getElementById('ai-mode').textContent = modeName;
        document.getElementById('ai-mode').style.color = "#6b7280";

        const predEl = document.getElementById('ai-pred');
        const barEl = document.getElementById('ai-bar');

        if (data.prediction === 'P') {
            predEl.textContent = "PLAYER [CON]";
            predEl.className = 'prediction pred-p';
            barEl.style.background = 'var(--neon-blue)';
            barEl.style.boxShadow = '0 0 10px var(--neon-blue)';
        } else {
            predEl.textContent = "BANKER [CÁI]";
            predEl.className = 'prediction pred-b';
            barEl.style.background = 'var(--neon-red)';
            barEl.style.boxShadow = '0 0 10px var(--neon-red)';
        }

        document.getElementById('ai-conf').textContent = `${data.confidence}%`;
        barEl.style.width = `${data.confidence}%`;
        document.getElementById('ai-reason').textContent = data.reasoning;
    }

    renderRoadmap();
</script>
</body>
</html>
