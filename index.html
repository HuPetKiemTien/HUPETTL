<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hũ Pet - Đăng Nhập</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Ẩn mũi tên của input number nếu có */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
    </style>
</head>
<body class="h-screen w-screen bg-gray-200 flex items-center justify-center overflow-hidden select-none">

    <!-- KHUNG APP CỐ ĐỊNH -->
    <div class="w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:max-h-[90vh] bg-white sm:rounded-[24px] shadow-2xl relative overflow-hidden flex flex-col border border-gray-200">
        
        <!-- HEADER (Nút quay lại) -->
        <div class="flex items-center justify-between px-4 py-4 bg-white z-10 sticky top-0 shrink-0">
            <button onclick="window.location.href='https://hupetkiemtien.github.io/HUPETTL/trangchu.html'" class="text-gray-500 hover:text-gray-800 transition-colors p-2 -ml-2 rounded-full hover:bg-gray-50">
                <i data-lucide="chevron-left" class="w-6 h-6"></i>
            </button>
            <div class="w-10"></div> <!-- Spacer -->
        </div>

        <!-- NỘI DUNG CUỘN ĐƯỢC BÊN TRONG -->
        <div class="flex-1 overflow-y-auto px-6 pb-8 flex flex-col">
            
            <!-- LOGO / TITLE HŨ PET -->
            <div class="flex flex-col items-center mt-2 mb-8">
                <div class="w-16 h-16 bg-[#e6f6f2] rounded-2xl flex items-center justify-center mb-3 shadow-inner border border-[#35b899]/20 transform rotate-3">
                    <i data-lucide="paw-print" class="w-8 h-8 text-[#35b899] -rotate-3 fill-[#35b899]/20"></i>
                </div>
                <h2 class="text-3xl font-black text-gray-900 tracking-tight">Hũ Pet</h2>
                <p class="text-[14px] text-gray-500 font-medium mt-1">Kết nối cộng đồng thú cưng</p>
            </div>

            <div id="authArea" class="w-full">
                <!-- FORM ĐĂNG NHẬP -->
                <div id="loginForm" class="flex flex-col animate-fade-in">
                    <div class="space-y-4">
                        <div class="relative flex items-center">
                            <i data-lucide="user" class="absolute left-4 w-5 h-5 text-gray-400"></i>
                            <input id="loginInput" type="text" placeholder="Tên tài khoản" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-[15px] font-medium text-gray-900 placeholder-gray-400 focus:outline-none focus:border-[#35b899] focus:bg-white focus:ring-4 focus:ring-[#35b899]/10 transition-all">
                        </div>
                        <div class="relative flex items-center">
                            <i data-lucide="lock" class="absolute left-4 w-5 h-5 text-gray-400"></i>
                            <input id="loginPass" type="password" placeholder="Mật khẩu" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-[15px] font-medium text-gray-900 placeholder-gray-400 focus:outline-none focus:border-[#35b899] focus:bg-white focus:ring-4 focus:ring-[#35b899]/10 transition-all">
                        </div>
                    </div>

                    <button id="btnLogin" class="w-full mt-6 py-3.5 bg-[#35b899] text-white font-bold rounded-xl text-[16px] shadow-[0_4px_14px_rgba(53,184,153,0.3)] hover:bg-[#2da185] transition-all active:scale-[0.98] flex justify-center items-center h-[52px]">
                        <span class="btn-text">Đăng Nhập</span>
                        <i data-lucide="loader-2" class="spinner hidden w-5 h-5 animate-spin"></i>
                    </button>

                    <p class="text-center mt-6 text-[14px] text-gray-500 font-medium">
                        Chưa có tài khoản? <span onclick="switchForm('register')" class="text-[#35b899] font-bold cursor-pointer hover:underline">Đăng ký ngay</span>
                    </p>
                </div>

                <!-- FORM ĐĂNG KÝ -->
                <div id="registerForm" class="hidden flex-col animate-fade-in">
                    <div class="space-y-3.5">
                        <div class="relative flex items-center">
                            <i data-lucide="user-plus" class="absolute left-4 w-5 h-5 text-gray-400"></i>
                            <input id="regName" type="text" placeholder="Tên tài khoản (Viết liền, không dấu)" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-[14px] font-medium text-gray-900 placeholder-gray-400 focus:outline-none focus:border-[#35b899] focus:bg-white focus:ring-4 focus:ring-[#35b899]/10 transition-all">
                        </div>
                        <div class="relative flex items-center">
                            <i data-lucide="phone" class="absolute left-4 w-5 h-5 text-gray-400"></i>
                            <input id="regPhone" type="tel" placeholder="Số điện thoại" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-[14px] font-medium text-gray-900 placeholder-gray-400 focus:outline-none focus:border-[#35b899] focus:bg-white focus:ring-4 focus:ring-[#35b899]/10 transition-all">
                        </div>
                        <div class="relative flex items-center">
                            <i data-lucide="mail" class="absolute left-4 w-5 h-5 text-gray-400"></i>
                            <input id="regEmail" type="email" placeholder="Email" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-[14px] font-medium text-gray-900 placeholder-gray-400 focus:outline-none focus:border-[#35b899] focus:bg-white focus:ring-4 focus:ring-[#35b899]/10 transition-all">
                        </div>
                        <div class="relative flex items-center">
                            <i data-lucide="lock" class="absolute left-4 w-5 h-5 text-gray-400"></i>
                            <input id="regPass" type="password" placeholder="Mật khẩu (Tối thiểu 6 ký tự)" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-[14px] font-medium text-gray-900 placeholder-gray-400 focus:outline-none focus:border-[#35b899] focus:bg-white focus:ring-4 focus:ring-[#35b899]/10 transition-all">
                        </div>
                    </div>

                    <button id="btnRegister" class="w-full mt-6 py-3.5 bg-[#35b899] text-white font-bold rounded-xl text-[16px] shadow-[0_4px_14px_rgba(53,184,153,0.3)] hover:bg-[#2da185] transition-all active:scale-[0.98] flex justify-center items-center h-[52px]">
                        <span class="btn-text">Đăng Ký</span>
                        <i data-lucide="loader-2" class="spinner hidden w-5 h-5 animate-spin"></i>
                    </button>

                    <p class="text-center mt-6 text-[14px] text-gray-500 font-medium">
                        Đã có tài khoản? <span onclick="switchForm('login')" class="text-[#35b899] font-bold cursor-pointer hover:underline">Đăng nhập</span>
                    </p>
                </div>

                <!-- Khu vực hiển thị thông báo lỗi/thành công -->
                <div id="msgContainer" class="hidden mt-4 px-4 py-3 rounded-lg border flex items-center gap-2">
                    <i id="msgIcon" class="w-4 h-4 shrink-0"></i>
                    <p id="msg" class="text-[13px] font-medium leading-tight"></p>
                </div>
            </div>
            
        </div>
    </div>

<!-- FIREBASE SCRIPT -->
<script type="module">
    // CẤU HÌNH FIREBASE (Giữ nguyên của bạn)
    const firebaseConfig = {
      apiKey: "AIzaSyAQuq-52qZ4FfsP66pVEVgYCP50zBNVKo4",
      authDomain: "hc88-dcaab.firebaseapp.com",
      databaseURL: "https://hc88-dcaab-default-rtdb.firebaseio.com",
      projectId: "hc88-dcaab",
      storageBucket: "hc88-dcaab.firebasestorage.app",
      messagingSenderId: "315665399762",
      appId: "1:315665399762:web:e5e34287e53381f496920b",
      measurementId: "G-9W1W79F84X"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import {
        getAuth,
        onAuthStateChanged,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        updateProfile
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import {
        getFirestore,
        doc,
        setDoc,
        collection,
        query,
        where,
        getDocs,
        serverTimestamp
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    lucide.createIcons();

    // DOM Elements
    const authArea = document.getElementById('authArea');
    const msgContainer = document.getElementById('msgContainer');
    const msg      = document.getElementById('msg');
    const msgIcon  = document.getElementById('msgIcon');
    
    const loginInput = document.getElementById('loginInput');
    const loginPass  = document.getElementById('loginPass');
    
    const regName  = document.getElementById('regName');
    const regPhone = document.getElementById('regPhone');
    const regEmail = document.getElementById('regEmail');
    const regPass  = document.getElementById('regPass');

    // Chuyển Form Đăng Nhập / Đăng Ký
    window.switchForm = (type) => {
        msgContainer.classList.add('hidden');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        
        if (type === 'login') {
            loginForm.classList.remove('hidden');
            loginForm.classList.add('flex');
            registerForm.classList.add('hidden');
            registerForm.classList.remove('flex');
        } else {
            loginForm.classList.add('hidden');
            loginForm.classList.remove('flex');
            registerForm.classList.remove('hidden');
            registerForm.classList.add('flex');
        }
    };

    // Hiển thị thông báo (Bản UI Tailwind mới)
    const showMsg = (text, type = 'error') => {
        if (!text) {
            msgContainer.classList.add('hidden');
            return;
        }
        msgContainer.classList.remove('hidden', 'bg-red-50', 'border-red-200', 'text-red-600', 'bg-emerald-50', 'border-emerald-200', 'text-emerald-600');
        
        if (type === 'error') {
            msgContainer.classList.add('bg-red-50', 'border-red-200', 'text-red-600');
            msgIcon.setAttribute('data-lucide', 'alert-circle');
        } else {
            msgContainer.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-600');
            msgIcon.setAttribute('data-lucide', 'check-circle-2');
        }
        
        msg.textContent = text;
        lucide.createIcons();
    };

    // Nút Loading Spinner
    const setLoading = (btnId, isLoading) => {
        const btn = document.getElementById(btnId);
        const text = btn.querySelector('.btn-text');
        const spinner = btn.querySelector('.spinner');
        if (isLoading) {
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            text.classList.add('hidden');
            spinner.classList.remove('hidden');
        } else {
            btn.disabled = false;
            btn.classList.remove('opacity-80', 'cursor-not-allowed');
            text.classList.remove('hidden');
            spinner.classList.add('hidden');
        }
    };

    // Lắng nghe trạng thái Auth -> Đồng bộ chuyển về Profile
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Đã đăng nhập -> Chuyển hướng sang trang Tôi (Profile)
            window.location.href = "profile.html";
        } else {
            // Chưa đăng nhập -> Form hiển thị bình thường
            document.querySelectorAll('input').forEach(i => i.value = '');
        }
    });

    // --- XỬ LÝ ĐĂNG KÝ ---
    document.getElementById('btnRegister').addEventListener('click', async () => {
        showMsg("");
        const name = regName.value.trim();
        const phone = regPhone.value.trim();
        const email = regEmail.value.trim();
        const pass = regPass.value.trim();

        if (!name || !phone || !email || !pass) return showMsg("Vui lòng điền đầy đủ thông tin.");
        if (pass.length < 6) return showMsg("Mật khẩu phải từ 6 ký tự trở lên.");

        const usernameClean = name.toLowerCase().replace(/\s+/g, '');
        if (usernameClean.length < 3) return showMsg("Tên tài khoản quá ngắn.");

        setLoading('btnRegister', true);

        try {
            const q = query(collection(db, "users"), where("username", "==", usernameClean));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
                throw new Error("Tên tài khoản này đã được sử dụng. Vui lòng chọn tên khác.");
            }

            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCred.user;

            await updateProfile(user, { displayName: name });

            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                email: email,
                displayName: name,
                username: usernameClean,
                phoneNumber: phone,
                balance: 0,
                isAdmin: false,
                createdAt: serverTimestamp(),
                saving: {
                    amount: 0, profit: 0, ratePerYear: 0.01, lastUpdateMs: Date.now()
                }
            });

            showMsg("Đăng ký thành công!", "success");

        } catch (err) {
            console.error(err);
            let message = err.message;
            if (err.code === 'auth/email-already-in-use') message = "Email này đã được đăng ký.";
            if (err.code === 'auth/invalid-email') message = "Email không hợp lệ.";
            showMsg(message);
        } finally {
            setLoading('btnRegister', false);
        }
    });

    // --- XỬ LÝ ĐĂNG NHẬP ---
    document.getElementById('btnLogin').addEventListener('click', async () => {
        showMsg("");
        const input = loginInput.value.trim();
        const pass = loginPass.value.trim();

        if (!input || !pass) return showMsg("Vui lòng nhập tài khoản và mật khẩu.");

        setLoading('btnLogin', true);

        try {
            let emailToLogin = input;
            // Dù placeholder chỉ ghi "Tên tài khoản", logic cũ vẫn xử lý được nếu người dùng cố tình nhập email
            const isEmail = input.includes('@');

            if (!isEmail) {
                const usernameClean = input.toLowerCase().replace(/\s+/g, '');
                const q = query(collection(db, "users"), where("username", "==", usernameClean));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    throw new Error("Tên tài khoản không tồn tại.");
                }

                querySnapshot.forEach((docSnap) => {
                    emailToLogin = docSnap.data().email;
                });
            }

            await signInWithEmailAndPassword(auth, emailToLogin, pass);
            showMsg("Đăng nhập thành công!", "success");

        } catch (err) {
            console.error(err);
            let message = err.message;
            if (err.code === 'auth/user-not-found' ||
                err.code === 'auth/wrong-password' ||
                err.code === 'auth/invalid-credential') {
                message = "Tài khoản hoặc mật khẩu không chính xác.";
            }
            showMsg(message);
        } finally {
            setLoading('btnLogin', false);
        }
    });

    // Gắn sự kiện nhấn Enter để đăng nhập/đăng ký
    document.getElementById('loginPass').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });
    document.getElementById('regPass').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') document.getElementById('btnRegister').click();
    });

</script>
</body>
</html>
