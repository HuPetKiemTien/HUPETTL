<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ví Điện Tử - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .card-gradient { background: linear-gradient(135deg, #115ec4 0%, #1a85e4 100%); }
        #toast-container { transition: all 0.3s ease; }
    </style>
</head>
<body class="h-screen bg-gray-200 flex items-center justify-center font-sans overflow-hidden text-gray-800 select-none">

    <!-- KHUNG APP MOBILE -->
    <div class="w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:max-h-[90vh] bg-[#F4F7F9] sm:rounded-[24px] shadow-2xl relative overflow-hidden flex flex-col">
        
        <!-- THÔNG BÁO (TOAST) -->
        <div id="toast" class="absolute top-4 left-1/2 -translate-x-1/2 z-[100] transform -translate-y-20 opacity-0 transition-all duration-300 pointer-events-none flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg font-bold text-[14px]">
            <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i>
            <span id="toast-msg"></span>
        </div>

        <!-- MÀN HÌNH ĐĂNG NHẬP / ĐĂNG KÝ -->
        <div id="view-auth" class="flex flex-col h-full bg-white absolute inset-0 z-50 p-6 animate-fade-in overflow-y-auto hide-scrollbar">
            <div class="text-center mt-10 mb-8">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="wallet" class="w-10 h-10 text-[#115ec4]"></i></div>
                <h1 class="text-2xl font-black text-gray-900" id="auth-title">Đăng Nhập</h1>
            </div>

            <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
                <button onclick="toggleAuth('login')" id="tab-login" class="flex-1 py-2 rounded-lg font-bold text-[14px] bg-white shadow-sm text-[#115ec4]">Đăng Nhập</button>
                <button onclick="toggleAuth('register')" id="tab-register" class="flex-1 py-2 rounded-lg font-bold text-[14px] text-gray-500">Đăng Ký</button>
            </div>

            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Tài khoản</label>
                    <input id="inp-user" type="text" class="w-full px-4 py-3.5 border-2 border-gray-200 bg-gray-50 rounded-xl font-bold focus:border-[#115ec4] outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Mật khẩu</label>
                    <input id="inp-pass" type="password" class="w-full px-4 py-3.5 border-2 border-gray-200 bg-gray-50 rounded-xl font-bold focus:border-[#115ec4] outline-none">
                </div>
                
                <!-- CAPTCHA -->
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 flex items-center justify-between gap-3">
                    <div class="flex items-center gap-2">
                        <i data-lucide="shield-check" class="text-[#115ec4] w-5 h-5"></i>
                        <span id="captcha-question" class="font-black text-[18px] text-gray-800 tracking-wider"></span>
                    </div>
                    <input id="inp-captcha" type="number" placeholder="=" class="w-20 px-3 py-2 text-center border-2 border-gray-200 rounded-lg font-bold focus:border-[#115ec4] outline-none">
                </div>
            </div>

            <button onclick="submitAuth()" class="w-full py-4 rounded-xl text-white font-bold text-[16px] transition-all bg-[#115ec4] active:scale-95 shadow-md">Xác nhận</button>
        </div>

        <!-- MÀN HÌNH CHÍNH (TÀI KHOẢN) -->
        <div id="view-home" class="hidden flex flex-col h-full bg-[#F4F7F9] animate-fade-in pb-24 overflow-y-auto hide-scrollbar z-10">
            <div class="p-5 bg-white rounded-b-3xl shadow-sm">
                <div class="flex justify-between items-center mb-5">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center border"><i data-lucide="user" class="w-6 h-6 text-gray-500"></i></div>
                        <div>
                            <p class="text-[12px] text-gray-500 font-medium">Xin chào,</p>
                            <p id="txt-username" class="text-[16px] font-bold text-gray-900">User</p>
                        </div>
                    </div>
                    <button onclick="logout()" class="p-2 text-gray-400"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                </div>
                <div class="card-gradient p-5 rounded-[20px] text-white relative overflow-hidden shadow-md">
                    <p class="text-[13px] font-medium text-blue-100 mb-1">Số dư khả dụng</p>
                    <div class="flex items-baseline gap-1">
                        <h2 id="txt-balance" class="text-[32px] font-black tracking-tight">0</h2><span class="text-[16px] font-bold text-blue-100">VND</span>
                    </div>
                </div>
            </div>

            <!-- MENU CHỨC NĂNG CHÍNH -->
            <div class="p-5 grid grid-cols-4 gap-3">
                <button onclick="switchView('deposit')" class="flex flex-col items-center gap-1.5"><div class="w-12 h-12 bg-blue-100 text-[#115ec4] rounded-xl flex items-center justify-center mb-1"><i data-lucide="arrow-down-to-line"></i></div><span class="text-[12px] font-bold">Nạp tiền</span></button>
                <button onclick="switchView('withdraw')" class="flex flex-col items-center gap-1.5"><div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center mb-1"><i data-lucide="arrow-up-from-line"></i></div><span class="text-[12px] font-bold">Rút tiền</span></button>
                <button onclick="linkTo('trochoi')" class="flex flex-col items-center gap-1.5"><div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-xl flex items-center justify-center mb-1"><i data-lucide="gamepad-2"></i></div><span class="text-[12px] font-bold">Trò chơi</span></button>
                <button onclick="linkTo('nhiemvu')" class="flex flex-col items-center gap-1.5"><div class="w-12 h-12 bg-green-100 text-green-600 rounded-xl flex items-center justify-center mb-1"><i data-lucide="target"></i></div><span class="text-[12px] font-bold">Nhiệm vụ</span></button>
                <button onclick="linkTo('dautu')" class="flex flex-col items-center gap-1.5"><div class="w-12 h-12 bg-yellow-100 text-yellow-600 rounded-xl flex items-center justify-center mb-1"><i data-lucide="trending-up"></i></div><span class="text-[12px] font-bold">Đầu tư</span></button>
                <button onclick="linkTo('cskh')" class="flex flex-col items-center gap-1.5"><div class="w-12 h-12 bg-gray-200 text-gray-700 rounded-xl flex items-center justify-center mb-1"><i data-lucide="headphones"></i></div><span class="text-[12px] font-bold">CSKH</span></button>
            </div>
        </div>

        <!-- MÀN HÌNH NẠP TIỀN -->
        <div id="view-deposit" class="hidden flex flex-col h-full bg-white z-20 absolute inset-0">
            <div class="p-4 bg-white shadow-sm flex items-center gap-3"><button onclick="switchView('home')"><i data-lucide="chevron-left"></i></button><h1 class="font-bold text-lg">Nạp Tiền</h1></div>
            <div class="p-5 overflow-y-auto">
                <p class="font-bold mb-3">Nhập số tiền nạp</p>
                <input id="inp-dep-amount" type="number" placeholder="Tối thiểu 20,000 VND" class="w-full px-4 py-4 border-2 border-gray-200 rounded-xl font-bold text-lg focus:border-[#115ec4] outline-none mb-6">
                <button onclick="submitDeposit()" class="w-full py-4 bg-[#115ec4] text-white font-bold rounded-xl">Tạo Đơn Nạp</button>
            </div>
        </div>

        <!-- MÀN HÌNH RÚT TIỀN -->
        <div id="view-withdraw" class="hidden flex flex-col h-full bg-white z-20 absolute inset-0">
            <div class="p-4 bg-white shadow-sm flex items-center gap-3"><button onclick="switchView('home')"><i data-lucide="chevron-left"></i></button><h1 class="font-bold text-lg">Rút Tiền</h1></div>
            <div class="p-5 overflow-y-auto space-y-4">
                <div><label class="font-bold text-sm text-gray-600">Ngân hàng</label><input id="inp-w-bank" type="text" placeholder="VD: MB Bank, Vietcombank" class="w-full px-4 py-3 bg-gray-50 border rounded-xl font-bold outline-none focus:border-[#115ec4] mt-1"></div>
                <div><label class="font-bold text-sm text-gray-600">Số tài khoản</label><input id="inp-w-acc" type="number" placeholder="Nhập số tài khoản" class="w-full px-4 py-3 bg-gray-50 border rounded-xl font-bold outline-none focus:border-[#115ec4] mt-1"></div>
                <div><label class="font-bold text-sm text-gray-600">Tên chủ thẻ</label><input id="inp-w-name" type="text" placeholder="VIẾT HOA KHÔNG DẤU" class="w-full px-4 py-3 bg-gray-50 border rounded-xl font-bold outline-none focus:border-[#115ec4] mt-1"></div>
                <div><label class="font-bold text-sm text-gray-600">Số tiền cần rút</label><input id="inp-w-amount" type="number" placeholder="Nhập số tiền" class="w-full px-4 py-3 bg-gray-50 border rounded-xl font-bold outline-none focus:border-[#115ec4] mt-1 text-[#115ec4]"></div>
                
                <button onclick="submitWithdraw()" class="w-full py-4 mt-4 bg-orange-500 text-white font-bold rounded-xl">Tạo Lệnh Rút</button>
            </div>
        </div>

        <!-- MÀN HÌNH LỊCH SỬ -->
        <div id="view-history" class="hidden flex flex-col h-full bg-[#F4F7F9] z-20 absolute inset-0">
            <div class="p-4 bg-white shadow-sm flex items-center gap-3"><button onclick="switchView('home')"><i data-lucide="chevron-left"></i></button><h1 class="font-bold text-lg">Lịch Sử Giao Dịch</h1></div>
            <div id="history-list" class="p-4 space-y-3 overflow-y-auto hide-scrollbar pb-10 flex-1"></div>
        </div>

        <!-- NAV BOTTOM -->
        <div id="bottom-nav" class="hidden absolute bottom-0 w-full bg-white border-t flex justify-around p-2 z-30">
            <button onclick="switchView('home')" class="flex flex-col items-center text-[#115ec4]"><i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px] font-bold">Trang chủ</span></button>
            <button onclick="switchView('history')" class="flex flex-col items-center text-gray-400 hover:text-[#115ec4]"><i data-lucide="receipt" class="w-6 h-6"></i><span class="text-[10px] font-bold">Lịch sử</span></button>
        </div>
    </div>

    <script>
        // --- HỆ THỐNG CƠ SỞ DỮ LIỆU ẢO DÙNG CHUNG (Để Admin và User cùng thấy) ---
        const DB_KEY = 'super_app_database';
        function getDB() { return JSON.parse(localStorage.getItem(DB_KEY)) || { users: [], transactions: [] }; }
        function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

        // --- BIẾN TOÀN CỤC ---
        let currentUser = null;
        let authMode = 'login';
        let captchaAnswer = 0;

        // --- CÁC HÀM TIỆN ÍCH ---
        function showToast(msg, type = 'error') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.className = `absolute top-4 left-1/2 -translate-x-1/2 z-[100] transform transition-all duration-300 flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg font-bold text-[14px] text-white ${type === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`;
            setTimeout(() => toast.classList.add('-translate-y-20', 'opacity-0'), 3000);
        }

        function generateCaptcha() {
            const n1 = Math.floor(Math.random() * 10) + 1;
            const n2 = Math.floor(Math.random() * 10) + 1;
            captchaAnswer = n1 + n2;
            document.getElementById('captcha-question').innerText = `${n1} + ${n2} = ?`;
            document.getElementById('inp-captcha').value = '';
        }

        function linkTo(page) {
            showToast(`Đang chuyển hướng đến trang ${page.toUpperCase()}...`, 'success');
            // Thực tế sẽ dùng: window.location.href = `${page}.html`
        }

        // --- XỬ LÝ AUTH ---
        function toggleAuth(mode) {
            authMode = mode;
            document.getElementById('auth-title').innerText = mode === 'login' ? 'Đăng Nhập' : 'Đăng Ký Mới';
            document.getElementById('tab-login').className = `flex-1 py-2 rounded-lg font-bold text-[14px] ${mode==='login' ? 'bg-white shadow-sm text-[#115ec4]' : 'text-gray-500'}`;
            document.getElementById('tab-register').className = `flex-1 py-2 rounded-lg font-bold text-[14px] ${mode==='register' ? 'bg-white shadow-sm text-[#115ec4]' : 'text-gray-500'}`;
            generateCaptcha();
        }

        function submitAuth() {
            const user = document.getElementById('inp-user').value.trim().toLowerCase();
            const pass = document.getElementById('inp-pass').value.trim();
            const cap = parseInt(document.getElementById('inp-captcha').value);

            if(!user || !pass) return showToast('Vui lòng nhập đủ thông tin');
            if(cap !== captchaAnswer) { generateCaptcha(); return showToast('Sai mã Captcha!'); }

            let db = getDB();
            let acc = db.users.find(u => u.username === user);

            if(authMode === 'register') {
                if(acc) return showToast('Tài khoản đã tồn tại!');
                acc = { id: 'U'+Date.now(), username: user, password: pass, balance: 0, status: 'active', phone: '', bank: '' };
                db.users.push(acc);
                saveDB(db);
                showToast('Đăng ký thành công!', 'success');
            } else {
                if(!acc || acc.password !== pass) return showToast('Sai tài khoản hoặc mật khẩu!');
                if(acc.status === 'locked') return showToast('Tài khoản đã bị Admin khoá!');
                showToast('Đăng nhập thành công!', 'success');
            }

            currentUser = acc;
            document.getElementById('view-auth').classList.add('hidden');
            switchView('home');
        }

        function logout() { currentUser = null; document.getElementById('view-auth').classList.remove('hidden'); generateCaptcha(); }

        // --- ĐIỀU HƯỚNG & CẬP NHẬT UI ---
        function switchView(view) {
            ['home', 'deposit', 'withdraw', 'history'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');

            if(view === 'home') updateHome();
            if(view === 'history') loadHistory();
        }

        function updateHome() {
            // Lấy data mới nhất từ DB
            const db = getDB();
            currentUser = db.users.find(u => u.username === currentUser.username) || currentUser;
            document.getElementById('txt-username').innerText = currentUser.username.toUpperCase();
            document.getElementById('txt-balance').innerText = currentUser.balance.toLocaleString('vi-VN');
        }

        // --- GIAO DỊCH ---
        function submitDeposit() {
            const amount = parseInt(document.getElementById('inp-dep-amount').value);
            if(!amount || amount < 20000) return showToast('Tối thiểu nạp 20,000 VND');
            
            let db = getDB();
            db.transactions.push({
                id: 'NAP' + Math.floor(Math.random()*1000000),
                type: 'deposit', username: currentUser.username, amount: amount, status: 'pending', date: Date.now()
            });
            saveDB(db);
            showToast('Tạo lệnh NẠP thành công. Chờ Admin duyệt!', 'success');
            document.getElementById('inp-dep-amount').value = '';
            switchView('history');
        }

        function submitWithdraw() {
            const bank = document.getElementById('inp-w-bank').value;
            const acc = document.getElementById('inp-w-acc').value;
            const name = document.getElementById('inp-w-name').value;
            const amount = parseInt(document.getElementById('inp-w-amount').value);

            if(!bank || !acc || !name || !amount) return showToast('Nhập đủ thông tin');
            if(amount > currentUser.balance) return showToast('Số dư không đủ!');

            let db = getDB();
            // Trừ tiền tạm thời (chờ duyệt)
            const userIndex = db.users.findIndex(u => u.username === currentUser.username);
            db.users[userIndex].balance -= amount;
            currentUser.balance -= amount; // update local

            db.transactions.push({
                id: 'RUT' + Math.floor(Math.random()*1000000),
                type: 'withdraw', username: currentUser.username, amount: amount, 
                bankInfo: `${bank} - ${acc} - ${name}`, status: 'pending', date: Date.now()
            });
            saveDB(db);
            showToast('Tạo lệnh RÚT thành công!', 'success');
            switchView('history');
        }

        function loadHistory() {
            const db = getDB();
            const myTx = db.transactions.filter(t => t.username === currentUser.username).reverse();
            const html = myTx.map(tx => {
                const isDep = tx.type === 'deposit';
                const color = tx.status === 'success' ? 'text-green-500' : tx.status === 'rejected' ? 'text-red-500' : 'text-blue-500';
                const statusTxt = tx.status === 'success' ? 'Hoàn tất' : tx.status === 'rejected' ? 'Từ chối' : 'Đang xử lý';
                return `
                <div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-bold text-sm ${isDep?'text-[#115ec4]':'text-orange-500'}">${isDep ? 'NẠP TIỀN' : 'RÚT TIỀN'}</p>
                        <p class="text-xs text-gray-400">${new Date(tx.date).toLocaleString('vi-VN')}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm">${isDep?'+':'-'}${tx.amount.toLocaleString('vi-VN')} ₫</p>
                        <p class="text-xs font-bold ${color}">${statusTxt}</p>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('history-list').innerHTML = html || '<p class="text-center text-gray-400 mt-10">Chưa có giao dịch</p>';
        }

        // Tự động làm mới UI (Để thấy Admin duyệt tiền)
        setInterval(() => { if(currentUser && !document.getElementById('view-home').classList.contains('hidden')) updateHome(); }, 2000);
        
        lucide.createIcons(); generateCaptcha();
    </script>
</body>
</html>
