<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style> body { background-color: #f3f4f6; font-family: sans-serif; } </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <!-- SIDEBAR -->
    <div class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
        <div class="p-6 font-black text-xl tracking-wider text-center border-b border-slate-700 text-blue-400">ADMIN PANEL</div>
        <div class="flex-1 p-4 space-y-2">
            <button onclick="showTab('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-lg font-bold"><i data-lucide="layout-dashboard"></i> Tổng Quan</button>
            <button onclick="showTab('users')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-lg font-bold transition"><i data-lucide="users"></i> Thành Viên</button>
            <button onclick="showTab('transactions')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-lg font-bold transition"><i data-lucide="arrow-right-left"></i> Nạp / Rút</button>
        </div>
        <div class="p-4"><button onclick="if(confirm('Làm sạch toàn bộ dữ liệu?')) { localStorage.removeItem('super_app_database'); location.reload(); }" class="w-full py-2 bg-red-600 rounded-lg font-bold text-sm hover:bg-red-700">RESET DỮ LIỆU</button></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- HEADER -->
        <header class="bg-white shadow-sm p-4 flex justify-between items-center z-10">
            <h2 id="header-title" class="text-xl font-bold">Tổng Quan</h2>
            <div class="flex gap-2 items-center bg-blue-50 text-blue-600 px-4 py-2 rounded-full font-bold text-sm"><i data-lucide="database" class="w-4 h-4"></i> Live Database</div>
        </header>

        <!-- DASHBOARD TAB -->
        <main id="tab-dashboard" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6 auto-rows-max">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 font-bold mb-1">Tổng Thành Viên</p>
                <h3 id="stat-users" class="text-3xl font-black">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-green-500">
                <p class="text-gray-500 font-bold mb-1">Tổng Số Dư Hệ Thống</p>
                <h3 id="stat-balance" class="text-3xl font-black text-green-600">0 ₫</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-orange-500">
                <p class="text-gray-500 font-bold mb-1">Yêu cầu chờ xử lý</p>
                <h3 id="stat-pending" class="text-3xl font-black text-orange-600">0</h3>
            </div>
        </main>

        <!-- USERS TAB -->
        <main id="tab-users" class="hidden flex-1 overflow-y-auto p-6">
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-200">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-500 text-sm border-b">
                        <tr><th class="p-4">Tài khoản</th><th class="p-4">SĐT/Ngân hàng</th><th class="p-4">Số dư (VND)</th><th class="p-4">Trạng thái</th><th class="p-4 text-right">Hành động</th></tr>
                    </thead>
                    <tbody id="users-table" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </main>

        <!-- TRANSACTIONS TAB -->
        <main id="tab-transactions" class="hidden flex-1 overflow-y-auto p-6">
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-200">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-500 text-sm border-b">
                        <tr><th class="p-4">Loại GD</th><th class="p-4">Tài khoản</th><th class="p-4">Số tiền</th><th class="p-4">Thông tin (Rút)</th><th class="p-4">Trạng thái</th><th class="p-4 text-right">Duyệt</th></tr>
                    </thead>
                    <tbody id="tx-table" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- MODAL EDIT USER -->
    <div id="modal-edit" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
        <div class="bg-white w-[400px] p-6 rounded-2xl shadow-xl">
            <h3 class="font-bold text-lg mb-4" id="edit-title">Sửa User</h3>
            <input type="hidden" id="edit-username">
            <div class="space-y-3">
                <div><label class="text-sm font-bold">Số điện thoại</label><input id="edit-phone" type="text" class="w-full p-2 border rounded"></div>
                <div><label class="text-sm font-bold">Ngân hàng (Tên - STK)</label><input id="edit-bank" type="text" class="w-full p-2 border rounded"></div>
                <div><label class="text-sm font-bold text-green-600">Cộng/Trừ tiền tay (+ / -)</label><input id="edit-add-money" type="number" placeholder="Nhập số tiền muốn cộng/trừ" class="w-full p-2 border rounded border-green-300"></div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="saveUserEdit()" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Lưu</button>
                <button onclick="document.getElementById('modal-edit').classList.add('hidden')" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded font-bold">Huỷ</button>
            </div>
        </div>
    </div>

    <script>
        const DB_KEY = 'super_app_database';
        function getDB() { return JSON.parse(localStorage.getItem(DB_KEY)) || { users: [], transactions: [] }; }
        function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); loadData(); }

        function showTab(tab) {
            ['dashboard', 'users', 'transactions'].forEach(t => document.getElementById(`tab-${t}`).classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            const titles = { dashboard: 'Tổng Quan', users: 'Quản Lý Thành Viên', transactions: 'Duyệt Nạp / Rút' };
            document.getElementById('header-title').innerText = titles[tab];
        }

        function loadData() {
            const db = getDB();
            
            // Dashboard
            document.getElementById('stat-users').innerText = db.users.length;
            document.getElementById('stat-balance').innerText = db.users.reduce((sum, u) => sum + u.balance, 0).toLocaleString('vi-VN') + ' ₫';
            document.getElementById('stat-pending').innerText = db.transactions.filter(t => t.status === 'pending').length;

            // Users Table
            document.getElementById('users-table').innerHTML = db.users.map(u => `
                <tr class="hover:bg-gray-50">
                    <td class="p-4 font-bold">${u.username}</td>
                    <td class="p-4 text-sm text-gray-500">${u.phone || 'Trống'}<br>${u.bank || 'Trống'}</td>
                    <td class="p-4 font-black text-green-600">${u.balance.toLocaleString('vi-VN')} ₫</td>
                    <td class="p-4"><span class="px-2 py-1 text-xs rounded-lg font-bold ${u.status==='active'?'bg-green-100 text-green-600':'bg-red-100 text-red-600'}">${u.status}</span></td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick="openEdit('${u.username}')" class="p-2 bg-blue-100 text-blue-600 rounded hover:bg-blue-200"><i data-lucide="edit" class="w-4 h-4"></i></button>
                        <button onclick="toggleLock('${u.username}')" class="p-2 ${u.status==='active'?'bg-orange-100 text-orange-600':'bg-green-100 text-green-600'} rounded"><i data-lucide="${u.status==='active'?'lock':'unlock'}" class="w-4 h-4"></i></button>
                        <button onclick="deleteUser('${u.username}')" class="p-2 bg-red-100 text-red-600 rounded hover:bg-red-200"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');

            // Transactions Table
            document.getElementById('tx-table').innerHTML = db.transactions.map(tx => {
                const isDep = tx.type === 'deposit';
                const statusBadge = tx.status === 'success' ? '<span class="text-green-600 bg-green-100 px-2 py-1 rounded text-xs font-bold">Đã duyệt</span>' 
                                  : tx.status === 'rejected' ? '<span class="text-red-600 bg-red-100 px-2 py-1 rounded text-xs font-bold">Từ chối</span>'
                                  : '<span class="text-orange-600 bg-orange-100 px-2 py-1 rounded text-xs font-bold animate-pulse">Chờ duyệt</span>';
                
                const actionBtns = tx.status === 'pending' ? `
                    <button onclick="processTx('${tx.id}', 'success')" class="px-3 py-1 bg-green-500 text-white rounded text-sm font-bold shadow-sm hover:bg-green-600">Duyệt</button>
                    <button onclick="processTx('${tx.id}', 'rejected')" class="px-3 py-1 bg-red-500 text-white rounded text-sm font-bold shadow-sm hover:bg-red-600">Huỷ</button>
                ` : '';

                return `
                <tr class="hover:bg-gray-50">
                    <td class="p-4 font-bold ${isDep?'text-blue-600':'text-orange-600'}">${isDep ? 'NẠP' : 'RÚT'}</td>
                    <td class="p-4 font-bold">${tx.username}</td>
                    <td class="p-4 font-black">${tx.amount.toLocaleString('vi-VN')} ₫</td>
                    <td class="p-4 text-sm text-gray-500">${tx.bankInfo || '-'}</td>
                    <td class="p-4">${statusBadge}</td>
                    <td class="p-4 text-right flex justify-end gap-2">${actionBtns}</td>
                </tr>`;
            }).reverse().join('');
            
            lucide.createIcons();
        }

        // --- XỬ LÝ GIAO DỊCH ---
        function processTx(txId, status) {
            let db = getDB();
            let tx = db.transactions.find(t => t.id === txId);
            let user = db.users.find(u => u.username === tx.username);

            if(!tx || !user) return;
            tx.status = status;

            if(tx.type === 'deposit' && status === 'success') {
                user.balance += tx.amount; // Cộng tiền khi duyệt Nạp
            } else if (tx.type === 'withdraw' && status === 'rejected') {
                user.balance += tx.amount; // Hoàn tiền khi từ chối Rút (vì lúc nãy ở app user đã trừ tạm)
            }
            saveDB(db);
        }

        // --- XỬ LÝ USER ---
        function toggleLock(username) {
            let db = getDB();
            let user = db.users.find(u => u.username === username);
            user.status = user.status === 'active' ? 'locked' : 'active';
            saveDB(db);
        }

        function deleteUser(username) {
            if(!confirm(`Xoá vĩnh viễn user ${username}?`)) return;
            let db = getDB();
            db.users = db.users.filter(u => u.username !== username);
            saveDB(db);
        }

        function openEdit(username) {
            let db = getDB();
            let user = db.users.find(u => u.username === username);
            document.getElementById('edit-username').value = username;
            document.getElementById('edit-title').innerText = `Sửa User: ${username}`;
            document.getElementById('edit-phone').value = user.phone || '';
            document.getElementById('edit-bank').value = user.bank || '';
            document.getElementById('edit-add-money').value = '';
            document.getElementById('modal-edit').classList.remove('hidden');
        }

        function saveUserEdit() {
            const username = document.getElementById('edit-username').value;
            const phone = document.getElementById('edit-phone').value;
            const bank = document.getElementById('edit-bank').value;
            const addMoney = parseInt(document.getElementById('edit-add-money').value) || 0;

            let db = getDB();
            let user = db.users.find(u => u.username === username);
            user.phone = phone;
            user.bank = bank;
            if(addMoney !== 0) {
                user.balance += addMoney;
                db.transactions.push({ id: 'SYS'+Date.now(), type: addMoney > 0 ? 'deposit' : 'withdraw', username: username, amount: Math.abs(addMoney), status: 'success', bankInfo: 'Admin cộng/trừ tay', date: Date.now() });
            }
            saveDB(db);
            document.getElementById('modal-edit').classList.add('hidden');
        }

        setInterval(loadData, 3000); // Tự động load mới dữ liệu mỗi 3s
        loadData();
    </script>
</body>
</html>
